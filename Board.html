<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="<?= fontUrl ?>">
  <style>
<?!= include('ThemeStyles') ?>

    /* ===========================================================
       BOARD THEME FLOURISHES (target Board-only markup)
       =========================================================== */
    [data-theme="terminal"] .team-card {
      background: repeating-linear-gradient(0deg, transparent 0, transparent 3px, rgba(0,30,15,.22) 4px), var(--card);
    }
    [data-theme="terminal"] .card-eyebrow::before { content:'> '; }

    [data-theme="broadcast"] .card-eyebrow {
      display:inline-block; background:var(--accent); color:#fff;
      padding:4px 10px 3px; letter-spacing:.18em; transform:skewX(-9deg); border-radius:2px;
    }

    [data-theme="brutalist"] .team-card::before { height:6px; }

    [data-theme="casino"] .team-maxbid { text-shadow:0 0 16px rgba(255,208,46,.5); }
    [data-theme="casino"] .card-eyebrow { text-shadow:0 0 12px rgba(255,77,109,.6); }

    /* ===========================================================
       BOARD LAYOUT (token-driven)
       =========================================================== */
    .board-shell { position:relative; z-index:1; max-width:1440px; margin:0 auto; padding:30px 22px 56px; }

    .board-head { margin:0 0 22px; display:flex; align-items:baseline; gap:16px; flex-wrap:wrap;
      padding-bottom:18px; border-bottom:1px solid var(--line); }
    .board-eyebrow {
      font-family:var(--font-display); font-weight:500; font-size:12px;
      letter-spacing:.32em; text-transform:uppercase; color:var(--accent);
    }
    .board-title {
      font-family:var(--font-display); font-weight:var(--display-weight); font-size:34px; line-height:1;
      letter-spacing:var(--display-spacing); text-transform:var(--display-transform); margin:0;
    }
    .board-sub { font-size:13px; color:var(--muted); margin-left:auto; font-family:var(--font-mono); }

    .team-grid {
      display:grid; gap:16px;
      grid-template-columns:repeat(auto-fill, minmax(240px, 1fr));
    }

    .team-card {
      position:relative; overflow:hidden;
      display:flex; flex-direction:column;
      background:var(--card); border:var(--card-border); border-radius:var(--radius);
      padding:18px 17px 16px; box-shadow:var(--shadow);
      animation:cardIn .25s ease both;
    }
    .team-card::before {
      content:""; position:absolute; top:0; left:0; right:0; height:3px; background:var(--topbar);
    }

    /* Header is the max-bid headline stat: value centered to the card, label to its right.
       Flex baseline-aligns the two; the label has zero layout width (text overflows to the
       right) so the value alone determines centering. */
    .team-head {
      display:flex; align-items:baseline; justify-content:center;
      margin-bottom:14px;
    }
    .team-maxbid-label {
      font-family:var(--font-display); font-weight:700; font-size:14px;
      color:var(--ink); width:0; white-space:nowrap; margin-left:8px;
    }
    .team-maxbid {
      font-family:var(--font-mono); font-weight:700; font-size:20px; line-height:1.1; color:var(--accent);
      letter-spacing:-.02em;
    }
    .team-maxbid.dim { color:var(--muted); opacity:.75; }

    .roster { display:flex; flex-direction:column; gap:1px; margin-bottom:14px; }
    .roster-row {
      display:flex; align-items:baseline; justify-content:space-between; gap:10px;
      padding:7px 0; border-bottom:1px solid var(--line);
    }
    .roster-row:last-child { border-bottom:none; }
    .slot-name { font-size:15px; font-weight:500; word-break:break-word; }
    .roster-row.empty .slot-name { color:var(--muted); font-weight:400; }
    .slot-price { font-family:var(--font-mono); font-size:13px; color:var(--muted); flex-shrink:0; }

    /* Captain = roster slot 1: same type as the players, just a subtle accent highlight. */
    .roster-row.captain { border-bottom:1px solid var(--line-strong); }
    .cap-name { color:var(--accent); font-weight:700; font-size:18px; }

    /* Pinned to the card bottom so role rows line up across all cards in a grid row,
       even when a wrapped captain name makes one card taller. */
    .roles { display:flex; gap:7px; flex-wrap:wrap; margin-top:auto; }
    .role {
      width:28px; height:28px; border-radius:var(--control-radius);
      background-size:62% 62%; background-repeat:no-repeat; background-position:center;
      background-color:var(--surface); border:1px solid var(--line);
      display:flex; align-items:center; justify-content:center;
      font-family:var(--font-mono); font-size:11px; font-weight:700; color:var(--muted);
      opacity:.32; filter:grayscale(1); transition:opacity .2s, filter .2s, border-color .2s, background-color .2s;
    }
    .role.on {
      opacity:1; filter:none; color:var(--accent-ink);
      background-color:var(--positive-soft); border-color:var(--positive-border);
    }
    /* Fill is the flexible role — push it to the right end, apart from the five lane roles.
       Scoped to the card role row so it doesn't also shift the Fill icon in the pool header. */
    .roles .role-fill { margin-left:auto; }

    .board-empty {
      grid-column:1 / -1; padding:44px 22px; text-align:center; color:var(--muted);
      background:var(--surface); border:1px dashed var(--line-strong); border-radius:var(--radius); font-size:16px;
    }

    /* ----- Available players (open pool), grouped by role, below the team cards ----- */
    .pool-section { margin-top:40px; padding-top:24px; border-top:1px solid var(--line); }
    .pool-head { display:flex; align-items:baseline; gap:14px; margin:0 0 18px; }
    .pool-title {
      font-family:var(--font-display); font-weight:var(--display-weight); font-size:24px; line-height:1;
      letter-spacing:var(--display-spacing); text-transform:var(--display-transform); margin:0;
    }
    .pool-count { font-family:var(--font-mono); font-size:13px; color:var(--muted); }

    .pool-grid {
      display:grid; gap:16px;
      grid-template-columns:repeat(auto-fill, minmax(160px, 1fr));
    }
    .pool-col {
      background:var(--card); border:var(--card-border); border-radius:var(--radius);
      padding:14px 14px 12px; box-shadow:var(--shadow);
    }
    .pool-col.empty { opacity:.4; }
    .pool-col-head {
      display:flex; align-items:center; gap:9px; margin-bottom:10px;
      padding-bottom:9px; border-bottom:1px solid var(--line);
    }
    /* Reuse the per-role .role-<key> background-image classes, but full-color (the .role base
       class is intentionally dimmed/grayscale, so we use our own base here). */
    .pool-icon {
      width:26px; height:26px; flex-shrink:0; border-radius:var(--control-radius);
      background-size:64% 64%; background-repeat:no-repeat; background-position:center;
      background-color:var(--positive-soft); border:1px solid var(--positive-border);
      display:flex; align-items:center; justify-content:center;
      font-family:var(--font-mono); font-size:10px; font-weight:700; color:var(--accent-ink);
    }
    .pool-col-label {
      font-family:var(--font-display); font-weight:700; font-size:13px; letter-spacing:.04em;
      text-transform:uppercase; color:var(--ink);
    }
    .pool-col-count { font-family:var(--font-mono); font-size:12px; color:var(--muted); margin-left:auto; }
    .pool-list { display:flex; flex-direction:column; gap:1px; }
    .pool-player { font-size:14px; padding:5px 0; border-bottom:1px solid var(--line); word-break:break-word; }
    .pool-player:last-child { border-bottom:none; }
    .pool-list.is-empty::after { content:"—"; color:var(--muted); font-size:14px; padding:5px 0; }

    /* ----- Turn-order rail, below the pool: captains in seat order, current one marked ----- */
    .turn-section { margin-top:40px; padding-top:24px; border-top:1px solid var(--line); }
    .turn-head { display:flex; align-items:baseline; gap:14px; margin:0 0 18px; }
    .turn-title {
      font-family:var(--font-display); font-weight:var(--display-weight); font-size:24px; line-height:1;
      letter-spacing:var(--display-spacing); text-transform:var(--display-transform); margin:0;
    }
    .turn-badge { font-family:var(--font-mono); font-size:13px; color:var(--muted); }

    /* One connected bar: captains share dividers rather than floating as separate buttons. */
    .turn-rail {
      display:inline-flex; flex-wrap:wrap; align-items:stretch;
      background:var(--surface); border:1px solid var(--line); border-radius:var(--control-radius);
      box-shadow:var(--shadow); overflow:hidden;
    }
    .turn-chip {
      display:flex; align-items:baseline; gap:9px;
      padding:10px 16px; border-right:1px solid var(--line);
      transition:background-color .2s, opacity .2s, filter .2s;
    }
    .turn-chip:last-child { border-right:none; }
    .turn-seat { font-family:var(--font-mono); font-size:12px; color:var(--muted); flex-shrink:0; }
    .turn-name {
      font-family:var(--font-display); font-weight:700; font-size:15px; letter-spacing:.02em;
      text-transform:uppercase; color:var(--ink);
    }
    .turn-chip.current { background:var(--accent-soft); }
    .turn-chip.current .turn-name { color:var(--accent); }

    .turn-chip.full { opacity:.45; filter:grayscale(1); }
    .turn-chip.full .turn-name { text-decoration:line-through; }

    @keyframes cardIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

    /* Per-role icon backgrounds (data URIs inlined once; the browser fetches no images). */
<? for (var _i = 0; _i < roleLabels.length; _i++) { var _r = roleLabels[_i]; if (roleIcons[_r]) { ?>
    .role-<?= _r.toLowerCase() ?> { background-image:url("<?!= roleIcons[_r] ?>"); }
<? } } ?>

<?!= include('InfoPanel') ?>
  </style>
</head>
<body data-theme="<?= theme ?>">
  <div class="board-shell">
    <div class="board-head">
      <div>
        <div class="board-eyebrow">Auction Draft</div>
        <h1 class="board-title">Teams</h1>
      </div>
      <div class="board-sub" id="board-sub"></div>
    </div>

    <div class="info-panel">
      <button type="button" class="info-toggle" aria-expanded="false" onclick="toggleInfo(this)">
        <span>Auction Rules</span><span class="info-caret">▾</span>
      </button>
      <div class="info-body" hidden>
        <h3>Auction Rules</h3>
<? for (var s = 0; s < infoSections.length; s++) { ?>        <h4 class="info-section-head"><?= infoSections[s].heading ?></h4>
        <ul class="info-rules">
<?   for (var i = 0; i < infoSections[s].items.length; i++) { ?>          <li><?!= infoSections[s].items[i] ?></li>
<?   } ?>        </ul>
<? } ?>      </div>
    </div>

    <div class="team-grid" id="board"></div>

    <div class="pool-section" id="pool-section" style="display:none">
      <div class="pool-head">
        <h2 class="pool-title">Available Players</h2>
        <span class="pool-count" id="pool-count"></span>
      </div>
      <div class="pool-grid" id="pool"></div>
    </div>

    <div class="turn-section" id="turn-section" style="display:none">
      <div class="turn-head">
        <h2 class="turn-title">Opening Bid Order</h2>
        <span class="turn-badge" id="turn-badge"></span>
      </div>
      <div class="turn-rail" id="turn-rail"></div>
    </div>
  </div>

  <script>
<?!= include('SharedScripts') ?>
    const ROLES = <?!= rolesJson ?>;

    // Poll cadence: jittered so 100 spectators don't fire in lockstep, paused while the
    // tab is hidden, and backed off on error. Keeps the shared ~30-execution cap safe.
    const POLL_MIN = 2500, POLL_MAX = 3500, BACKOFF_STEP = 2000, BACKOFF_MAX = 10000;
    let pollTimer = null;
    let backoff = 0;
    let cardEls = {};        // captain -> { el, key } — persistent card elements, updated in place
    let messageShown = false; // true while an empty/error placeholder is showing
    let poolCols = null;      // role key -> { col, list, count } — built once, lists updated in place
    let poolPrefix = null;    // 3-letter role prefix (as stored in the sheet, e.g. "jun") -> role key
    let turnChips = null;     // [{ el, seat, name }] in seat order — built once, classes updated in place

    function nextDelay() {
      return POLL_MIN + Math.random() * (POLL_MAX - POLL_MIN) + backoff;
    }
    function scheduleNext(delay) {
      clearTimeout(pollTimer);
      pollTimer = setTimeout(poll, delay);
    }

    function poll() {
      if (document.hidden) return;   // paused; visibilitychange resumes the chain
      google.script.run
        .withSuccessHandler(onState)
        .withFailureHandler(onFail)
        .getBoardState();
    }
    function onState(state) {
      backoff = 0;
      render(state);
      scheduleNext(nextDelay());
    }
    function onFail() {
      backoff = Math.min(backoff + BACKOFF_STEP, BACKOFF_MAX);
      scheduleNext(nextDelay());
    }

    document.addEventListener('visibilitychange', function() {
      if (!document.hidden) { backoff = 0; clearTimeout(pollTimer); poll(); }
    });

    // Persistent card per captain. Each card's DOM is built ONCE (with cached refs to its
    // mutable parts); every poll only updates the text/classes that actually changed and
    // never recreates the role-icon elements — so there is nothing to re-decode or
    // re-animate, and the board stays still even while values update.
    function render(state) {
      const root = document.getElementById('board');
      if (!state) return;
      if (state.error) { showMessage(root, esc(state.error)); return; }

      const teams = state.teams || [];

      if (!teams.length) { showMessage(root, 'No teams yet.'); updateSub(0); return; }
      if (messageShown) { root.innerHTML = ''; cardEls = {}; messageShown = false; }

      const seen = {};
      for (let i = 0; i < teams.length; i++) {
        const t = teams[i];
        const dim = t.full;   // gray when the team is full
        seen[t.captain] = true;

        let card = cardEls[t.captain];
        if (!card) card = cardEls[t.captain] = buildCard(t);
        updateCard(card, t, dim);

        // Keep DOM order matching team order (no-op when already in place).
        if (root.children[i] !== card.el) root.insertBefore(card.el, root.children[i] || null);
      }

      // Drop cards for teams that disappeared.
      for (const cap in cardEls) {
        if (!seen[cap]) { root.removeChild(cardEls[cap].el); delete cardEls[cap]; }
      }
      updateSub(teams.length);
      renderPool(state.openPlayers || []);
      renderTurn(state.turn);
    }

    function showMessage(root, msg) {
      root.innerHTML = '<div class="board-empty">' + msg + '</div>';
      cardEls = {};
      messageShown = true;
      hidePool();
      hideTurn();
    }

    function updateSub(n) {
      const sub = document.getElementById('board-sub');
      if (sub) sub.textContent = n + (n === 1 ? ' team' : ' teams');
    }

    // ----- card build (once) / update (in place) -----

    function el(tag, cls, text) {
      const e = document.createElement(tag);
      if (cls) e.className = cls;
      if (text != null) e.textContent = text;
      return e;
    }
    function setText(node, v) { if (node.textContent !== v) node.textContent = v; }

    function buildCard(t) {
      const card = { el: el('div', 'team-card') };

      // Header: max-bid headline (value centered to the card, label to its right).
      const head = el('div', 'team-head');
      card.maxBid = el('span', 'team-maxbid');
      head.appendChild(card.maxBid);
      head.appendChild(el('span', 'team-maxbid-label', '(Max bid)'));
      card.el.appendChild(head);

      const roster = el('div', 'roster');

      // Slot 1: the captain — name prominent, price in the same aligned column as players.
      const capRow = el('div', 'roster-row captain');
      const capName = el('span', 'slot-name');
      card.captainName = el('span', 'cap-name');
      capName.appendChild(card.captainName);
      capRow.appendChild(capName);
      card.captainPrice = el('span', 'slot-price');
      capRow.appendChild(card.captainPrice);
      roster.appendChild(capRow);

      // Drafted player slots.
      card.slots = [];
      const slotCount = (t.players || []).length;
      for (let i = 0; i < slotCount; i++) {
        const row = el('div', 'roster-row');
        const name = el('span', 'slot-name');
        const price = el('span', 'slot-price');
        row.appendChild(name);
        row.appendChild(price);
        roster.appendChild(row);
        card.slots.push({ row: row, name: name, price: price });
      }
      card.el.appendChild(roster);

      const rolesWrap = el('div', 'roles');
      card.roles = [];
      for (let i = 0; i < ROLES.length; i++) {
        const r = ROLES[i];
        const rEl = el('div', 'role role-' + r.key, r.hasIcon ? '' : r.label.slice(0, 3));
        rEl.title = r.label;
        rolesWrap.appendChild(rEl);
        card.roles.push(rEl);
      }
      card.el.appendChild(rolesWrap);

      return card;
    }

    function updateCard(card, t, dim) {
      setText(card.captainName, t.captain);
      setText(card.captainPrice, '$' + t.captainPrice);
      setText(card.maxBid, '$' + t.maxBid);
      card.maxBid.classList.toggle('dim', !!dim);

      const players = t.players || [];
      for (let i = 0; i < card.slots.length; i++) {
        const s = card.slots[i];
        const p = players[i];
        if (p && p.name) {
          s.row.classList.remove('empty');
          setText(s.name, p.name);
          setText(s.price, '$' + p.price);
        } else {
          s.row.classList.add('empty');
          setText(s.name, '—');
          setText(s.price, '');
        }
      }

      const flags = t.roles || [];
      for (let i = 0; i < card.roles.length; i++) {
        card.roles[i].classList.toggle('on', !!flags[i]);
      }
    }

    // ----- available-players pool (build columns once, update lists in place) -----

    // One column per role (ROLES order), keyed by role key. The role-icon element is built
    // ONCE per column so its inlined data-URI background is never re-decoded (no flicker).
    function buildPool() {
      const grid = document.getElementById('pool');
      poolCols = {};
      poolPrefix = {};
      for (let i = 0; i < ROLES.length; i++) {
        addPoolCol(grid, ROLES[i]);
        poolPrefix[ROLES[i].key.slice(0, 3)] = ROLES[i].key;   // sheet stores the 3-letter prefix
      }
    }

    function addPoolCol(grid, role) {
      const col = el('div', 'pool-col');
      const head = el('div', 'pool-col-head');
      const icon = el('div', 'pool-icon role-' + role.key, role.hasIcon ? '' : role.label.slice(0, 3));
      icon.title = role.label;
      head.appendChild(icon);
      head.appendChild(el('span', 'pool-col-label', role.label));
      const count = el('span', 'pool-col-count');
      head.appendChild(count);
      col.appendChild(head);
      const list = el('div', 'pool-list');
      col.appendChild(list);
      grid.appendChild(col);
      return (poolCols[role.key] = { col: col, list: list, count: count });
    }

    function hidePool() {
      const sec = document.getElementById('pool-section');
      if (sec) sec.style.display = 'none';
    }

    function renderPool(players) {
      if (!players.length) { hidePool(); return; }
      if (!poolCols) buildPool();

      // Bucket players by role. The sheet stores a 3-letter prefix (e.g. "jun" for Jungle),
      // so match on the first 3 letters; anything unrecognized falls into "Other".
      const buckets = {};
      for (let i = 0; i < players.length; i++) {
        const p = players[i];
        const prefix = (p.role || '').toLowerCase().slice(0, 3);
        const bucket = poolPrefix[prefix] || 'other';
        (buckets[bucket] = buckets[bucket] || []).push(p.name);
      }

      // The "Other" column is exceptional: created lazily when an unknown role shows up, and
      // removed entirely when empty so it reclaims its horizontal space (the six fixed role
      // columns instead stay as dimmed placeholders for a stable layout).
      if (buckets.other && !poolCols.other) {
        addPoolCol(document.getElementById('pool'), { key: 'other', label: 'Other', hasIcon: false });
      } else if (!buckets.other && poolCols.other) {
        poolCols.other.col.remove();
        delete poolCols.other;
      }

      for (const key in poolCols) {
        const c = poolCols[key];
        const names = buckets[key] || [];
        c.list.classList.toggle('is-empty', names.length === 0);
        c.col.classList.toggle('empty', names.length === 0);
        c.count.textContent = names.length || '';
        // List items carry no background images, so rebuilding them can't cause icon flicker.
        c.list.textContent = '';
        for (let i = 0; i < names.length; i++) c.list.appendChild(el('div', 'pool-player', names[i]));
      }

      const total = players.length;
      const countEl = document.getElementById('pool-count');
      if (countEl) countEl.textContent = total + ' available';
      document.getElementById('pool-section').style.display = '';
    }

    // ----- turn-order rail (build chips once, update highlight/dim in place) -----

    function hideTurn() {
      const sec = document.getElementById('turn-section');
      if (sec) sec.style.display = 'none';
    }

    // Each chip's DOM (seat number + name + NOW/FULL tags) is built once; only its
    // .current/.full classes change per poll, so there is nothing to re-render.
    function buildTurnRail(names) {
      const rail = document.getElementById('turn-rail');
      rail.textContent = '';
      turnChips = [];
      for (let i = 0; i < names.length; i++) {
        const chip = el('div', 'turn-chip');
        chip.appendChild(el('span', 'turn-seat', (i + 1) + '.'));
        chip.appendChild(el('span', 'turn-name', names[i]));
        rail.appendChild(chip);
        turnChips.push(chip);
      }
    }

    function renderTurn(turn) {
      const names = (turn && turn.order) || [];
      if (!names.length) { hideTurn(); return; }

      if (!turnChips || turnChips.length !== names.length) buildTurnRail(names);

      const finished = turn.phase === 'FINISHED' || turn.currentIndex < 0;
      for (let i = 0; i < turnChips.length; i++) {
        const chip = turnChips[i];
        chip.querySelector('.turn-name').textContent = names[i];
        chip.classList.toggle('current', !finished && i === turn.currentIndex);
        chip.classList.toggle('full', turn.full && turn.full[names[i]] === true);
      }

      const badge = document.getElementById('turn-badge');
      if (badge) {
        if (finished) {
          badge.textContent = 'Complete';
        } else if (turn.mode === 'SNAKE') {
          badge.textContent = 'Snake ' + (turn.direction === 'UP' ? '←' : '→');
        } else {
          badge.textContent = 'Waterfall →';
        }
      }

      document.getElementById('turn-section').style.display = '';
    }

    poll();
  </script>
</body>
</html>
