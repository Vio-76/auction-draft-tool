<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width: 480px; margin: 0 auto; padding: 16px; color: #222; }
    .captain-tag { font-size: 14px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
    .captain-name { font-size: 22px; font-weight: 700; margin-bottom: 24px; }
    .waiting { padding: 40px 20px; text-align: center; color: #888; background: #f4f4f4; border-radius: 10px; font-size: 18px; }
    .invalid { padding: 40px 20px; text-align: center; color: #c33; background: #fdecea; border-radius: 10px; font-size: 18px; }
    .finished { padding: 40px 20px; text-align: center; color: #2a9d4f; background: #eaf6ec; border-radius: 10px; font-size: 18px; font-weight: 700; }
    .opening-prompt { font-size: 18px; font-weight: 700; margin-bottom: 12px; color: #4a90e2; }
    .player { font-size: 32px; font-weight: 700; margin: 8px 0 16px; word-break: break-all; }
    .bid-line { font-size: 18px; margin-bottom: 4px; }
    .bid-amount { font-weight: 700; }
    .leading-you { color: #2a9d4f; }
    .max-line { color: #888; font-size: 14px; margin: 12px 0; }
    .team-full { padding: 12px; background: #fff3cd; border-radius: 6px; color: #7a5c00; font-weight: 600; margin-top: 8px; }
    select, input { font-size: 18px; padding: 10px; border: 2px solid #ccc; border-radius: 6px; box-sizing: border-box; }
    select { width: 100%; margin-bottom: 12px; }
    input { width: 140px; }
    button { font-size: 18px; padding: 12px 24px; background: #4a90e2; color: white; border: none; border-radius: 6px; cursor: pointer; margin-left: 8px; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    .skip-row { margin-top: 32px; text-align: right; }
    .skip-btn { font-size: 13px; padding: 6px 12px; background: transparent; color: #888; border: 1px solid #ccc; margin-left: 0; }
    .skip-btn:hover { background: #f4f4f4; color: #555; }
    .error { color: #c33; margin-top: 12px; min-height: 20px; }
    .opening-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .opening-row .opening-prompt { flex: 1; margin-bottom: 0; }
    .timer-svg { flex-shrink: 0; }
    .sell-timer-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 12px; }
    .sell-prompt { font-size: 16px; font-weight: 700; color: #4a90e2; }
    .priced-out { padding: 12px; background: #fdecea; border-radius: 6px; color: #a01818; font-weight: 600; margin-top: 8px; }
    .sold-banner { padding: 12px 16px; margin-bottom: 16px; text-align: center; background: #fff6da; color: #7a5c00; border-radius: 8px; font-weight: 700; font-size: 17px; }
  </style>
</head>
<body>
<? if (!authorized) { ?>
  <div class="invalid">Invalid link. Check your captain name and code.</div>
<? } else { ?>
  <div class="captain-tag">Captain</div>
  <div class="captain-name"><?= captain ?></div>
  <div id="sold-banner"></div>
  <div id="content"></div>

  <script>
    const captain = <?!= JSON.stringify(captain) ?>;
    const code    = <?!= JSON.stringify(code) ?>;
    const STATUSES = <?!= JSON.stringify(statuses) ?>;
    const SELL_MODE_AUTO = <?!= JSON.stringify(sellModeAuto) ?>;
    let lastKey = '';
    let submitting = false;

    //for the openingbid countdown visualization
    const OPENING_TIMEOUT = <?!= openingBidTimeoutSeconds ?>;
    const TIMER_R = 26;
    const TIMER_C = 2 * Math.PI * TIMER_R; // circumference, ~163.36

    let timerEndsAt = null;
    let timerInterval = null;
    let lastTurnSig = '';
    let autoSkipFired = false;

    // AUTO-mode bidding countdown (server auto-sells when it reaches zero)
    let sellEndsAt = null;
    let sellInterval = null;
    let sellWindow = 0;
    let lastBidSig = '';

    function esc(s) {
      return String(s).replace(/[&<>"']/g, function(c) {
        return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
      });
    }

    function setSubmitting(value) {
      submitting = value;
      const btn1 = document.getElementById('submit');
      const btn2 = document.getElementById('skip');
      if (btn1) btn1.disabled = value;
      if (btn2) btn2.disabled = value;
    }

    function showError(msg) {
      const el = document.getElementById('error');
      if (el) el.textContent = msg;
    }

    function render(state) {
      if (state && state.unauthorized) {
        document.getElementById('content').innerHTML = '<div class="invalid">Session expired or invalid.</div>';
        return;
      }

      const key = JSON.stringify([
        state.phase, state.isYourTurnToOpen, state.currentTurnCaptain,
        state.player, state.highestBid, state.byCaptain,
        state.yourMaxBid, state.smallBlind, state.openPlayers,
        state.youAreFull, state.sellMode
      ]);
      if (key === lastKey) return;
      lastKey = key;

      // Preserve form state across re-renders
      const oldAmount = document.getElementById('amount');
      const oldPlayer = document.getElementById('player-select');
      const savedAmount = oldAmount ? oldAmount.value : '';
      const savedPlayer = oldPlayer ? oldPlayer.value : '';
      const focusedId = document.activeElement ? document.activeElement.id : '';

      const root = document.getElementById('content');

      if (state.phase === STATUSES.FINISHED) {
        root.innerHTML = '<div class="finished">Auction finished.</div>';
        return;
      }

      if (state.phase === STATUSES.OPENING) {
        if (state.isYourTurnToOpen) {
          renderOpeningBid(root, state);
        } else {
          const turnCap = state.currentTurnCaptain || 'someone';
          root.innerHTML = '<div class="waiting">Waiting for <b>' + esc(turnCap) + '</b> to choose a player…</div>';
          return;
        }
      } else if (state.phase === STATUSES.BIDDING) {
        renderRegularBid(root, state);
      } else {
        root.innerHTML = '<div class="waiting">Waiting for next auction…</div>';
        return;
      }

      // Restore form state
      const newAmount = document.getElementById('amount');
      const newPlayer = document.getElementById('player-select');
      if (newAmount && savedAmount) newAmount.value = savedAmount;
      if (newPlayer && savedPlayer) newPlayer.value = savedPlayer;
      if (focusedId) {
        const el = document.getElementById(focusedId);
        if (el) el.focus();
      }
    }

    function renderOpeningBid(root, state) {
      let options = '<option value="">— Choose a player —</option>';
      const players = state.openPlayers || [];
      for (let i = 0; i < players.length; i++) {
        options += '<option value="' + esc(players[i]) + '">' + esc(players[i]) + '</option>';
      }

      root.innerHTML =
        '<div class="opening-row">' +
          '<div class="opening-prompt">Your turn — pick a player and place your opening bid:</div>' +
          '<svg class="timer-svg" width="60" height="60" viewBox="0 0 60 60">' +
            '<circle cx="30" cy="30" r="26" fill="none" stroke="#eee" stroke-width="4"/>' +
            '<circle id="timer-arc" cx="30" cy="30" r="26" fill="none" stroke="#4a90e2" stroke-width="4" ' +
              'stroke-dasharray="' + TIMER_C + '" stroke-dashoffset="0" transform="rotate(-90 30 30)"/>' +
            '<text id="timer-text" x="30" y="36" text-anchor="middle" font-size="18" font-weight="700">' + OPENING_TIMEOUT + '</text>' +
          '</svg>' +
        '</div>' +
        '<select id="player-select">' + options + '</select>' +
        '<div class="max-line">Min opening bid: $' + state.smallBlind + ' • Your max bid: $' + state.yourMaxBid + '</div>' +
        '<input id="amount" type="number" min="' + state.smallBlind + '" step="1" placeholder="Opening bid">' +
        '<button id="submit">Place opening bid</button>' +
        '<div class="error" id="error"></div>' +
        '<div class="skip-row"><button id="skip" class="skip-btn">Skip your turn</button></div>';


      document.getElementById('submit').onclick = submitOpeningBid;
      document.getElementById('skip').onclick = submitSkip;
      document.getElementById('amount').onkeydown = function(e) { if (e.key === 'Enter') submitOpeningBid(); };
    }

    function syncTimer(state) {
      // Detect a new turn — reset autoSkip guard and re-anchor the local deadline
      const sig = state.phase + '|' + state.currentTurnCaptain + '|' + (state.isYourTurnToOpen ? 'Y' : 'N');
      if (sig !== lastTurnSig) {
        lastTurnSig = sig;
        autoSkipFired = false;
        timerEndsAt = state.isYourTurnToOpen
          ? Date.now() + (state.secondsRemaining || 0) * 1000
          : null;
      }

      if (timerEndsAt && !timerInterval) {
        timerInterval = setInterval(tickTimer, 100);
        tickTimer();
      } else if (!timerEndsAt && timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }

    function tickTimer() {
      if (!timerEndsAt) return;
      const remainingSec = Math.max(0, (timerEndsAt - Date.now()) / 1000);

      const arc = document.getElementById('timer-arc');
      const text = document.getElementById('timer-text');
      if (arc && text) {
        const fraction = Math.min(1, (OPENING_TIMEOUT - remainingSec) / OPENING_TIMEOUT);
        arc.setAttribute('stroke-dashoffset', String(TIMER_C * fraction));
        text.textContent = String(Math.ceil(remainingSec));
        arc.setAttribute('stroke', remainingSec < 10 ? '#c33' : '#4a90e2');
      }

      if (remainingSec <= 0 && !autoSkipFired) {
        autoSkipFired = true;
        google.script.run
          .withSuccessHandler(function() { lastKey = ''; poll(); })
          .withFailureHandler(function() { lastKey = ''; poll(); })
          .skipTurn(captain, code);
      }
    }

    function syncSellTimer(state) {
      const active = state.phase === STATUSES.BIDDING && state.sellMode === SELL_MODE_AUTO;
      if (!active) {
        if (sellInterval) { clearInterval(sellInterval); sellInterval = null; }
        sellEndsAt = null;
        lastBidSig = '';
        return;
      }
      // Re-anchor the local deadline on every new bid (covers anti-snipe extension)
      // and on first entry to the bidding phase.
      const sig = state.highestBid + '|' + state.byCaptain;
      if (sig !== lastBidSig) {
        lastBidSig = sig;
        sellWindow = state.sellWindowSeconds || 0;
        sellEndsAt = Date.now() + (state.sellSecondsRemaining || 0) * 1000;
      }
      if (sellEndsAt && !sellInterval) {
        sellInterval = setInterval(tickSellTimer, 100);
        tickSellTimer();
      }
    }

    // Display only — the server performs the auto-sell. The client never triggers it.
    function tickSellTimer() {
      if (!sellEndsAt) return;
      const remainingSec = Math.max(0, (sellEndsAt - Date.now()) / 1000);

      const arc  = document.getElementById('sell-arc');
      const text = document.getElementById('sell-text');
      if (arc && text && sellWindow > 0) {
        const fraction = Math.min(1, (sellWindow - remainingSec) / sellWindow);
        arc.setAttribute('stroke-dashoffset', String(TIMER_C * fraction));
        text.textContent = String(Math.ceil(remainingSec));
        arc.setAttribute('stroke', remainingSec < 5 ? '#c33' : '#4a90e2');
      }

      const label = document.getElementById('sell-label');
      if (label) label.textContent = remainingSec <= 0 ? 'Selling…' : 'Player will be sold in:';
    }

    function renderRegularBid(root, state) {
      const leadingYou = state.byCaptain === captain;
      const byHtml = state.byCaptain
        ? ' by ' + (leadingYou ? '<span class="leading-you">you</span>' : esc(state.byCaptain))
        : '';

      const pricedOut = !state.youAreFull
        && state.yourMaxBid <= state.highestBid;

      const bidControls = state.youAreFull
        ? '<div class="team-full">Your team is full — you can\'t place bids.</div>'
        : pricedOut
          ? '<div class="priced-out">Max bid reached ($' + state.yourMaxBid + ') — you can\'t outbid this.</div>'
          : '<input id="amount" type="number" min="' + (state.highestBid + 1) + '" step="1" placeholder="Your bid">' +
            '<button id="submit">Bid</button>';

      // AUTO mode shows a countdown ring; it resets on every new bid, and the
      // server sells when it reaches zero. MANUAL mode shows no timer.
      const timerHtml = state.sellMode === SELL_MODE_AUTO
        ? '<div class="sell-timer-row">' +
            '<div class="sell-prompt" id="sell-label">Player will be sold in:</div>' +
            '<svg class="timer-svg" width="60" height="60" viewBox="0 0 60 60">' +
              '<circle cx="30" cy="30" r="26" fill="none" stroke="#eee" stroke-width="4"/>' +
              '<circle id="sell-arc" cx="30" cy="30" r="26" fill="none" stroke="#4a90e2" stroke-width="4" ' +
                'stroke-dasharray="' + TIMER_C + '" stroke-dashoffset="0" transform="rotate(-90 30 30)"/>' +
              '<text id="sell-text" x="30" y="36" text-anchor="middle" font-size="18" font-weight="700"></text>' +
            '</svg>' +
          '</div>'
        : '';

      root.innerHTML =
        timerHtml +
        '<div class="player">' + esc(state.player) + '</div>' +
        '<div class="bid-line">Highest bid: <span class="bid-amount">$' + state.highestBid + '</span>' + byHtml + '</div>' +
        '<div class="max-line">Your max bid: $' + state.yourMaxBid + '</div>' +
        bidControls +
        '<div class="error" id="error"></div>';

      if (!state.youAreFull && !pricedOut) {
        document.getElementById('submit').onclick = submitRegularBid;
        document.getElementById('amount').onkeydown = function(e) { if (e.key === 'Enter') submitRegularBid(); };
      }
    }

    function submitOpeningBid() {
      if (submitting) return;
      const player = document.getElementById('player-select').value;
      const amount = Number(document.getElementById('amount').value);
      if (!player) { showError('Pick a player first.'); return; }
      if (!amount)  { showError('Enter an opening bid.'); return; }
      if (!Number.isInteger(amount)) { showError('Bid must be a whole number.'); return; }
      setSubmitting(true);
      showError('');

      google.script.run
        .withSuccessHandler(function(res) {
          setSubmitting(false);
          if (res.ok) {
            lastKey = '';
            poll();
          } else {
            showError(res.error);
          }
        })
        .withFailureHandler(function(err) {
          setSubmitting(false);
          showError('Error: ' + err.message);
        })
        .placeOpeningBid(captain, code, player, amount);
    }

    function submitSkip() {
      if (submitting) return;
      setSubmitting(true);
      showError('');

      google.script.run
        .withSuccessHandler(function(res) {
          setSubmitting(false);
          if (res.ok) {
            lastKey = '';
            poll();
          } else {
            showError(res.error);
          }
        })
        .withFailureHandler(function(err) {
          setSubmitting(false);
          showError('Error: ' + err.message);
        })
        .skipTurn(captain, code);
    }

    function submitRegularBid() {
      if (submitting) return;
      const amount = Number(document.getElementById('amount').value);
      if (!amount) return;
      if (!Number.isInteger(amount)) { showError('Bid must be a whole number.'); return; }
      setSubmitting(true);
      showError('');

      google.script.run
        .withSuccessHandler(function(res) {
          setSubmitting(false);
          if (res.ok) {
            document.getElementById('amount').value = '';
            lastKey = '';
            poll();
          } else {
            showError(res.error);
          }
        })
        .withFailureHandler(function(err) {
          setSubmitting(false);
          showError('Error: ' + err.message);
        })
        .placeBid(captain, code, amount);
    }

    let lastSoldSig = '';
    function updateSoldBanner(state) {
      const banner = document.getElementById('sold-banner');
      if (!banner) return;
      const m = state && state.soldMessage;
      const sig = m ? (m.player + '|' + m.winner + '|' + m.bid) : '';
      if (sig === lastSoldSig) return;
      lastSoldSig = sig;
      banner.innerHTML = m
        ? '<div class="sold-banner">' + esc(m.player) + ' has been sold to '
            + esc(m.winner) + ' for $' + esc(m.bid) + '.</div>'
        : '';
    }

    function poll() {
      google.script.run.withSuccessHandler(function(state) {
        render(state);
        if (state) { syncTimer(state); syncSellTimer(state); updateSoldBanner(state); }
      }).getState(captain, code);
    }

    setInterval(poll, 1000);
    poll();
  </script>
<? } ?>
</body>
</html>
